<div class="dialog-overlay" (click)="onCancel()">
  <div class="dialog-container" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      @if (isConfirmDangerous) {
        <i class="ph ph-warning-circle dialog-icon warning"></i>
      } @else {
        <i class="ph ph-info dialog-icon info"></i>
      }
      <h3>{{ title }}</h3>
    </div>

    <div class="dialog-body">
      <p>{{ message }}</p>
    </div>

    <div class="dialog-footer">
      <button class="btn btn-cancel" (click)="onCancel()">
        {{ cancelText }}
      </button>
      <button class="btn btn-confirm" [class.danger]="isConfirmDangerous" (click)="onConfirm()">
        {{ confirmText }}
      </button>
    </div>
  </div>
</div>
