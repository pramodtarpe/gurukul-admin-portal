<div class="dashboard-grid">
  <!-- Tile 1: Total Users -->
  <div class="stat-card">
    <div class="stat-icon icon-blue">
      <i class="ph ph-users"></i> <!-- Using Phosphor or FontAwesome -->
    </div>
    <div class="stat-content">
      <p class="stat-label">Total Users</p>
      <h3 class="stat-value">12,540</h3>
      <p class="stat-trend trend-up">
        <span>↑ 12%</span> vs last month
      </p>
    </div>
  </div>

  <!-- Tile 2: Revenue -->
  <div class="stat-card">
    <div class="stat-icon icon-green">
      <i class="ph ph-currency-dollar"></i>
    </div>
    <div class="stat-content">
      <p class="stat-label">Monthly Revenue</p>
      <h3 class="stat-value">$45,200</h3>
      <p class="stat-trend trend-up">
        <span>↑ 8.4%</span> vs last month
      </p>
    </div>
  </div>

  <!-- Tile 3: Active Sessions -->
  <div class="stat-card">
    <div class="stat-icon icon-orange">
      <i class="ph ph-activity"></i>
    </div>
    <div class="stat-content">
      <p class="stat-label">Active Sessions</p>
      <h3 class="stat-value">1,205</h3>
      <p class="stat-trend trend-down">
        <span>↓ 2%</span> vs last hour
      </p>
    </div>
  </div>

  <!-- Tile 4: Pending Tasks -->
  <div class="stat-card">
    <div class="stat-icon icon-purple">
      <i class="ph ph-clock"></i>
    </div>
    <div class="stat-content">
      <p class="stat-label">Pending Tasks</p>
      <h3 class="stat-value">48</h3>
      <p class="stat-trend">
        <span>Stable</span> since yesterday
      </p>
    </div>
  </div>
</div>
