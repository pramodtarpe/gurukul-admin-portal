<div class="stat-card" [class.trend-up]="data.trend?.type === 'up'" [class.trend-down]="data.trend?.type === 'down'" [class.trend-neutral]="data.trend?.type === 'neutral'">
  <div class="stat-icon" [style.background-color]="data.bgColor">
    <span class="icon">{{ data.icon }}</span>
  </div>
  <div class="stat-content">
    <p class="stat-label">{{ data.title }}</p>
    @if (isLoading) {
      <div class="loading-value">
        <div class="shimmer-bar" style="width: 60%;"></div>
      </div>
    } @else {
      <h3 class="stat-value">{{ formatNumber(data.value) || '0' }}</h3>
    }
    @if (!isLoading && data.trend) {
      <p class="stat-trend">
        <span [class]="getTrendClass()">
          {{ data.trend.value }}
        </span>
        {{ data.trend.label }}
      </p>
    }
  </div>
</div>
