<div class="dashboard-container">
  <div class="dashboard-header">
    <h2>Dashboard Overview</h2>
    <p>Welcome back! Here is what's happening with your platform today.</p>
  </div>

  <div class="tiles-container">
    @for (tile of tiles; track tile.title) {
      <ga-stat-tile [data]="tile" [isLoading]="loadingStates[$index]"></ga-stat-tile>
    }
  </div>

  <p class="disclaimer">This data is updated every 6 hours and is not real-time.</p>
</div>
