<nav class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-header">
    <button class="collapse-toggle" (click)="toggleCollapse()" type="button" aria-label="Toggle sidebar">
      @if (!collapsed) {
      <i class="ph ph-caret-left"></i>
      } @else {
      <i class="ph ph-caret-right"></i>
      }
    </button>
  </div>

  <div class="sidebar-wrapper">
    <div class="nav-section">
      <ul class="nav-list">
        <li class="nav-item">
          <a routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="ph ph-house"></i>
            <span>Home</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/users" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="ph ph-users"></i>
            <span>User Management</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/exam" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="ph ph-graduation-cap"></i>
            <span>Exam Management</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/file" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="ph ph-folder-open"></i>
            <span>File Management</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/news" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="ph ph-newspaper"></i>
            <span>News Management</span>
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/ads" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="ph ph-image"></i>
            <span>Ads Management</span>
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Maintenance Mode - fixed at bottom of sidebar -->
  <div class="maintenance-footer">
    <hr class="divider" />
    <ul class="nav-list maintenance-section">
      <li class="nav-item">
        <a routerLink="/maintenance" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="maintenance-nav-link">
          <i class="ph ph-wrench"></i>
          <span>Maintenance Mode</span>
        </a>
      </li>
    </ul>
  </div>

</nav>
